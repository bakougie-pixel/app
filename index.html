<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bakougie · Nouveautés & journal</title>
<meta name="description" content="Nouveautés, coulisses et rendez-vous Bakougie — bougies et fondants parfumés faits main en France.">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#800020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bakougie">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<style>
  :root{
    --wine:#800020; --wine-deep:#5E0018; --wine-soft:#F4E7EA;
    --gold:#C9A24B; --gold-deep:#A9863A; --gold-soft:#F2E6C6;
    --cream:#FBF7F1; --white:#FFFFFF;
    --ink:#2A1216; --ink-soft:#6E5A5E; --ink-faint:#9C8B8F;
    --line:#EBDDDF; --line-gold:#E8D7AE;
    --radius:16px;
    --shadow:0 1px 2px rgba(70,10,25,.05), 0 14px 30px -18px rgba(70,10,25,.25);
    font-family:'Hanken Grotesk', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.55;}
  a{color:inherit;}
  .mono{font-variant-numeric:tabular-nums;}

  .topbar{position:sticky;top:0;z-index:30;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 18px 10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:30px;width:auto;display:block;}
  .brand .mark{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;letter-spacing:.5px;color:#fff;}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .topnav{display:flex;align-items:center;gap:8px;}
  .navbtn{appearance:none;border:1px solid rgba(201,162,75,.55);background:rgba(201,162,75,.16);color:var(--gold);border-radius:22px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;letter-spacing:.02em;}
  .navbtn .ic{font-size:15px;line-height:1;}
  .navbtn:active{transform:translateY(1px);}
  .navbtn.active{background:var(--gold);color:#3a2a06;border-color:var(--gold);}
  @media (max-width:440px){ .navbtn .lbl{display:none;} #bellLabel{display:none;} .navbtn{padding:8px 11px;} .bell{padding:8px 11px;} }

  /* Vue dédiée BAK'MUSIC */
  body.view-music .hero,
  body.view-music .install-hint{display:none;}
  body.view-music #notifCard{display:none!important;}
  .pagehead{display:flex;align-items:center;gap:12px;margin:4px 0 16px;}
  .backbtn{appearance:none;border:1px solid var(--line-gold);background:var(--white);color:var(--wine);border-radius:22px;padding:9px 15px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;box-shadow:var(--shadow);}
  .backbtn:active{transform:translateY(1px);background:var(--cream);}
  .admin-stub{display:flex;align-items:center;gap:12px;background:var(--white);border:1px dashed var(--line-gold);border-radius:var(--radius);padding:14px 16px;}
  .admin-stub .em{font-size:22px;}
  .admin-stub .st-main{flex:1;min-width:0;}
  .admin-stub .st-main b{display:block;font-size:15px;}
  .admin-stub .st-main span{font-size:12.5px;color:var(--ink-faint);}
  .admin-stub button{appearance:none;border:1px solid var(--wine);background:var(--wine);color:#fff;border-radius:10px;padding:9px 13px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;flex:none;}

  .bell{appearance:none;border:1px solid rgba(255,255,255,.32);background:rgba(255,255,255,.1);color:#fff;border-radius:22px;padding:7px 13px;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;}
  .bell:active{transform:translateY(1px);}
  .bell.on{background:var(--gold);border-color:var(--gold);color:#3a2a06;}

  .hero{position:relative;overflow:hidden;text-align:center;padding:40px 20px 34px;background:
      radial-gradient(120% 90% at 50% -20%, var(--wine-soft), rgba(244,231,234,0) 60%), var(--cream);
    border-bottom:1px solid var(--line);}
  .hero img.emblem{height:74px;width:auto;margin:0 auto 12px;display:block;}
  .hero h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(34px,9vw,52px);line-height:1;margin:0 0 8px;color:var(--wine);letter-spacing:.5px;}
  .hero .tag{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:clamp(15px,4.2vw,19px);color:var(--gold-deep);margin:0 0 14px;}
  .hero .intro{max-width:44ch;margin:0 auto;color:var(--ink-soft);font-size:15px;}
  .hero .gold-rule{width:56px;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-deep));border-radius:3px;margin:16px auto 0;}

  .wrap{max-width:680px;margin:0 auto;padding:22px 16px calc(70px + env(safe-area-inset-bottom));}
  body.admin .wrap{padding-bottom:calc(120px + env(safe-area-inset-bottom));}

  /* Notifications */
  .notif{background:var(--wine);color:#F6E9EC;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-top:-22px;position:relative;z-index:5;border:1px solid var(--wine-deep);}
  .notif h2{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin:0 0 4px;color:#fff;display:flex;align-items:center;gap:9px;}
  .notif p{margin:0 0 14px;font-size:14px;color:#E7CBD2;}
  .notif .cta{appearance:none;border:none;border-radius:12px;background:var(--gold);color:#3a2a06;font-weight:700;font-size:15.5px;padding:14px 18px;width:100%;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:9px;}
  .notif .cta:active{transform:translateY(1px);}
  .notif .cta.done{background:#EADFC2;}
  .notif .steps{margin:12px 0 0;padding:0;list-style:none;font-size:13.5px;color:#EAD3D9;}
  .notif .steps li{display:flex;gap:9px;padding:5px 0;align-items:flex-start;}
  .notif .steps .n{flex:none;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .notif .admin-note{font-size:12.5px;color:#F2D9A8;background:rgba(201,162,75,.16);border:1px solid rgba(201,162,75,.4);border-radius:10px;padding:9px 11px;margin-top:10px;}

  /* Blocs */
  .block{position:relative;margin-top:22px;}
  .section-head{display:flex;align-items:baseline;gap:10px;margin:0 2px 14px;}
  .section-head h2{font-family:'Fraunces',serif;font-weight:500;font-size:23px;margin:0;color:var(--ink);}
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);}

  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .card-media{height:150px;background:radial-gradient(90% 120% at 30% 0%, rgba(201,162,75,.28), rgba(201,162,75,0) 60%), linear-gradient(150deg, var(--wine), var(--wine-deep));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:40px;}
  .card-media img{width:100%;height:100%;object-fit:cover;display:block;}
  .card-body{padding:15px 17px 17px;}
  .card-date{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px;}
  .card-body h3{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin:0 0 6px;line-height:1.25;}
  .card-body p{margin:0;color:var(--ink-soft);font-size:14.5px;}
  .card-body .more{display:inline-block;margin-top:11px;color:var(--wine);font-weight:700;font-size:14px;text-decoration:none;}

  .post{display:block;padding:15px 4px;border-top:1px solid var(--line);text-decoration:none;}
  .journal-first .post{border-top:none;}
  .post h3{font-family:'Fraunces',serif;font-weight:500;font-size:18px;margin:0 0 4px;color:var(--ink);}
  .post p{margin:0;color:var(--ink-soft);font-size:14px;}
  .post .more{color:var(--wine);font-weight:700;font-size:13.5px;}

  .live-banner{background:linear-gradient(100deg,var(--wine),var(--wine-deep));color:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:11px;font-weight:600;box-shadow:var(--shadow);border:1px solid var(--gold);text-decoration:none;}
  .live-banner .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(201,162,75,.3);flex:none;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .live-banner.inactive{opacity:.5;filter:grayscale(.4);}

  .cta-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--wine);color:#fff;border-radius:12px;padding:14px 22px;font-weight:700;font-size:15px;text-decoration:none;box-shadow:var(--shadow);}
  .cta-wrap{text-align:center;}

  .textblock{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;}
  .textblock h3{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin:0 0 6px;color:var(--ink);}
  .textblock p{margin:0;color:var(--ink-soft);font-size:15px;white-space:pre-wrap;}

  figure.imgblock{margin:0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--white);}
  figure.imgblock img{width:100%;display:block;}
  figure.imgblock figcaption{padding:9px 14px;font-size:13px;color:var(--ink-soft);}
  .imgblock .ph{height:170px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);background:var(--wine-soft);}

  .links{display:flex;flex-direction:column;gap:10px;}
  .link-btn{display:flex;align-items:center;gap:13px;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-decoration:none;font-weight:600;font-size:15.5px;box-shadow:var(--shadow);}
  .link-btn:active{transform:translateY(1px);}
  .link-btn .ic{width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;}
  .link-btn .ic.shop{background:var(--wine);}
  .link-btn .ic.tt{background:#111;}
  .link-btn .ic.ig{background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);}
  .link-btn .arr{margin-left:auto;color:var(--ink-faint);}

  .install-hint{margin-top:32px;text-align:center;font-size:13px;color:var(--ink-faint);background:var(--white);border:1px dashed var(--line-gold);border-radius:12px;padding:13px 15px;}
  .install-hint b{color:var(--ink-soft);}
  footer{margin-top:36px;text-align:center;color:var(--ink-faint);font-size:12.5px;padding-top:18px;border-top:1px solid var(--line);}
  footer .adot{display:inline-block;width:16px;height:16px;margin-left:6px;opacity:.28;cursor:pointer;vertical-align:middle;}
  .empty-note{color:var(--ink-faint);font-size:14px;font-style:italic;padding:8px 2px;}

  /* ADMIN */
  body.admin .block{outline:1.5px dashed var(--line-gold);outline-offset:6px;border-radius:6px;}
  .blk-tools{position:absolute;top:-12px;right:0;display:none;gap:4px;z-index:6;}
  body.admin .block:hover .blk-tools, body.admin .block .blk-tools{display:flex;}
  .blk-tools button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--white);color:var(--ink-soft);cursor:pointer;font-size:14px;line-height:0;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .blk-tools button:active{transform:translateY(1px);}
  .blk-tools button.del{color:var(--wine);}
  .blk-label{position:absolute;top:-12px;left:0;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gold-deep);background:var(--gold-soft);border:1px solid var(--line-gold);border-radius:6px;padding:2px 7px;display:none;}
  body.admin .block .blk-label{display:inline-block;}

  .adminbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--wine);color:#fff;display:none;align-items:center;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -8px 24px -12px rgba(0,0,0,.4);}
  body.admin .adminbar{display:flex;}
  .adminbar .ab-title{font-weight:700;font-size:13px;margin-right:auto;display:flex;align-items:center;gap:7px;}
  .adminbar .ab-title .g{color:var(--gold);}
  .adminbar button{appearance:none;border-radius:10px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.1);color:#fff;font-weight:600;font-size:13.5px;padding:9px 12px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
  .adminbar button.pub{background:var(--gold);color:#3a2a06;border-color:var(--gold);}
  .adminbar button:active{transform:translateY(1px);}

  /* Modales */
  .overlay{position:fixed;inset:0;background:rgba(40,10,20,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:60;}
  .modal{background:var(--white);border-radius:18px;box-shadow:0 24px 60px -20px rgba(40,8,18,.55);width:100%;max-width:520px;max-height:92vh;overflow:auto;}
  .modal-head{padding:18px 22px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:1;}
  .modal-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:20px;margin:0;color:var(--wine);}
  .modal-body{padding:18px 22px;}
  .modal-foot{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}
  .icon-btn{appearance:none;background:none;border:none;cursor:pointer;color:var(--ink-faint);padding:6px;border-radius:8px;line-height:0;}
  .icon-btn:active{background:var(--cream);}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink);}
  .field input[type=text],.field input[type=password],.field input[type=date],.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line-gold);border-radius:11px;font-family:inherit;font-size:15px;background:var(--cream);color:var(--ink);}
  .field textarea{min-height:90px;resize:vertical;}
  .field input:focus,.field textarea:focus{outline:2px solid var(--gold);border-color:transparent;background:#fff;}
  .field.bool{display:flex;align-items:center;gap:10px;}
  .field.bool input{width:20px;height:20px;accent-color:var(--wine);}
  .field.bool label{margin:0;}
  .btn{appearance:none;cursor:pointer;border-radius:11px;font-weight:700;font-size:14.5px;padding:11px 16px;border:1px solid transparent;font-family:inherit;}
  .btn-primary{background:var(--wine);color:#fff;}
  .btn-gold{background:var(--gold);color:#3a2a06;}
  .btn-ghost{background:var(--white);border-color:var(--line-gold);color:var(--ink);}
  .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .type-card{display:flex;align-items:center;gap:10px;padding:14px;border:1px solid var(--line-gold);border-radius:12px;background:var(--cream);cursor:pointer;font-weight:600;font-size:14.5px;text-align:left;font-family:inherit;color:var(--ink);}
  .type-card:active{background:#fff;}
  .type-card .em{font-size:20px;}
  .muted{color:var(--ink-faint);font-size:12.5px;}
  .login-lock{width:44px;height:44px;border-radius:50%;background:var(--wine);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 10px;}
  .login-err{color:var(--wine);font-size:13.5px;font-weight:600;margin-top:6px;min-height:18px;}

  /* BAK'MUSIC */
  .music{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .music-head{background:linear-gradient(120deg,var(--wine),var(--wine-deep));color:#fff;padding:15px 17px;display:flex;align-items:center;gap:12px;}
  .music-head .note{width:40px;height:40px;border-radius:12px;background:rgba(201,162,75,.22);border:1px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
  .music-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:20px;margin:0;line-height:1.15;}
  .music-head .sub{font-size:12.5px;color:#E7CBD2;}
  .music-search{padding:10px 13px;border-bottom:1px solid var(--line);}
  .music-search input{width:100%;padding:10px 12px;border:1px solid var(--line-gold);border-radius:10px;background:var(--cream);font-family:inherit;font-size:14.5px;color:var(--ink);}
  .music-search input:focus{outline:2px solid var(--gold);border-color:transparent;background:#fff;}
  .tracks{list-style:none;margin:0;padding:0;}
  .track{display:flex;align-items:center;gap:12px;padding:10px 13px;border-top:1px solid var(--line);}
  .tracks li:first-child .track{border-top:none;}
  .track.playing{background:var(--wine-soft);}
  .play-btn{width:40px;height:40px;flex:none;border-radius:50%;border:none;background:var(--wine);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:0;box-shadow:0 2px 6px -2px rgba(94,0,24,.6);}
  .track.playing .play-btn{background:var(--gold);color:#3a2a06;}
  .play-btn:active{transform:scale(.94);}
  .track-main{flex:1;min-width:0;}
  .track-title{font-weight:600;font-size:14.5px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .track.playing .track-title{color:var(--wine);}
  .track-bar{height:4px;background:var(--line);border-radius:3px;margin-top:7px;overflow:hidden;display:none;cursor:pointer;}
  .track.playing .track-bar{display:block;}
  .track-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-deep));border-radius:3px;}
  .track-time{font-size:11.5px;color:var(--ink-faint);margin-top:3px;display:none;font-variant-numeric:tabular-nums;}
  .track.playing .track-time{display:block;}
  .track .dl{color:var(--ink-faint);text-decoration:none;padding:8px;border-radius:8px;flex:none;line-height:0;}
  .track .dl:active{background:var(--cream);}
  .music-more{width:100%;border:none;border-top:1px solid var(--line);background:var(--cream);color:var(--wine);font-weight:700;font-size:14px;padding:13px;cursor:pointer;font-family:inherit;}
  .music-more:active{background:var(--wine-soft);}
  .track-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;background:var(--cream);}
  .track-row .tr-name{flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .track-row .tr-num{font-size:12px;color:var(--ink-faint);width:22px;flex:none;text-align:center;font-weight:700;}
  .track-row button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-gold);background:#fff;cursor:pointer;font-size:13px;line-height:0;color:var(--ink-soft);flex:none;}
  .track-row button.del{color:var(--wine);}

  /* ===== BAK'MUSIC — page dédiée ===== */
  .m-hero{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,var(--wine),var(--wine-deep));color:#fff;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:14px;}
  .m-hero .note{width:46px;height:46px;border-radius:14px;background:rgba(201,162,75,.22);border:1px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
  .m-hero h2{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin:0;line-height:1.15;}
  .m-hero .sub{font-size:12.5px;color:#E7CBD2;margin-top:2px;}

  .mtabs{display:flex;gap:5px;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:13px;box-shadow:var(--shadow);}
  .mtab{flex:1;appearance:none;border:none;background:none;border-radius:10px;padding:11px 6px;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
  .mtab.active{background:var(--wine);color:#fff;}

  .rec-chip{appearance:none;border:1px solid var(--line);background:var(--white);border-radius:20px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;white-space:nowrap;flex:none;}
  .rec-chip:active{background:var(--cream);}

  /* Feuille d'options d'un titre */
  .sheet-item{display:flex;align-items:center;gap:11px;width:100%;appearance:none;border:1px solid var(--line);background:var(--white);border-radius:12px;padding:13px 15px;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:8px;text-decoration:none;text-align:left;}
  .sheet-item:active{background:var(--cream);}
  .sheet-item.strong{background:var(--cream);}

  body.playing .miniplayer{display:block;}
  body.admin .miniplayer{bottom:calc(56px + env(safe-area-inset-bottom));padding-bottom:0;}
  .mp-bar{height:5px;background:rgba(255,255,255,.18);cursor:pointer;}

  @media (max-width:400px){ .mp-b{padding:7px 5px;} .mp-info b{font-size:13px;} }

  #toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(14px);opacity:0;visibility:hidden;pointer-events:none;z-index:80;background:var(--ink);color:#F6ECDF;padding:12px 18px;border-radius:12px;font-size:14.5px;font-weight:500;box-shadow:0 12px 30px -10px rgba(0,0,0,.4);transition:opacity .25s ease, transform .3s cubic-bezier(.2,.9,.3,1), visibility .3s;max-width:90vw;text-align:center;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;}
  body.admin #toast{bottom:calc(78px + env(safe-area-inset-bottom));}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
</style>

<script src="contenu.js"></script>
<script>
/* ===== Sécurité admin (empreinte chiffrée, jamais le mot de passe en clair) ===== */
const ADMIN_SALT = "bakougie-atelier-2026::";
const ADMIN_HASH = "d13aa31fbbd5039dacbefb446426ac5e988d687bc78ecb51e7148948b938edbd";
async function sha256hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ===== Utilitaires ===== */
const $=(s)=>document.querySelector(s);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function fold(s){ return String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }
function uid(){ return 'b_'+Math.random().toString(36).slice(2,9); }
function fmtDate(s){ try{ return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}); }catch(e){ return s; } }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2300); }
function today(){ return new Date().toISOString().slice(0,10); }
function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); }
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone===true; }

/* ===== Modèle ===== */
const CFG_DEFAULT = (typeof BAKOUGIE_CONFIG!=='undefined')?BAKOUGIE_CONFIG:{};
function backcompatBlocks(){
  const bl=[];
  if(typeof NOUVEAUTES!=='undefined' && NOUVEAUTES.length){
    bl.push({id:uid(),type:'section',data:{eyebrow:'Frais du jour',titre:'Nouveautés'}});
    NOUVEAUTES.forEach(n=>bl.push({id:uid(),type:'nouveaute',data:{...n}}));
  }
  if(typeof ARTICLES!=='undefined' && ARTICLES.length){
    bl.push({id:uid(),type:'section',data:{eyebrow:'Coulisses & conseils',titre:'Le journal'}});
    ARTICLES.forEach(a=>bl.push({id:uid(),type:'article',data:{...a}}));
  }
  bl.push({id:uid(),type:'section',data:{eyebrow:'',titre:'Nous suivre'}});
  bl.push({id:uid(),type:'liens',data:{}});
  return bl;
}
const PUBLISHED = (typeof PAGE_BLOCKS!=='undefined' && Array.isArray(PAGE_BLOCKS)) ? PAGE_BLOCKS : backcompatBlocks();

let CONFIG = Object.assign({marque:'Bakougie',tagline:'',intro:'',liens:{}}, clone(CFG_DEFAULT));
let blocks = clone(PUBLISHED);
let isAdmin = sessionStorage.getItem('bkg_admin')==='1';

const DRAFT_KEY='bakougie_page_draft_v1';
function saveDraft(){ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({config:CONFIG,blocks})); }catch(e){} }
function loadDraft(){ try{ const d=JSON.parse(localStorage.getItem(DRAFT_KEY)); if(d&&Array.isArray(d.blocks)) return d; }catch(e){} return null; }
function clearDraft(){ try{ localStorage.removeItem(DRAFT_KEY); }catch(e){} }
if(isAdmin){ const d=loadDraft(); if(d){ CONFIG=Object.assign(CONFIG,d.config||{}); blocks=d.blocks; } document.body.classList.add('admin'); }

/* ===== En-tête / hero ===== */
function renderHeader(){
  $('#year').textContent=new Date().getFullYear();
  $('#brandMark').textContent=CONFIG.marque||'Bakougie';
  $('#heroTitle').textContent=CONFIG.marque||'Bakougie';
  $('#heroTag').textContent=CONFIG.tagline||'';
  $('#heroIntro').textContent=CONFIG.intro||'';
  const nav=$('#musicNav');
  if(nav){
    const mb=blocks.find(b=>b.type==='bakmusic');
    nav.style.display = mb ? '' : 'none';
    if(mb){ const lbl=nav.querySelector('.lbl'); if(lbl) lbl.textContent = mb.data.titre || "BAK'MUSIC"; }
  }
}

/* ===== Rendu des blocs ===== */
const TYPE_LABELS={live:'Bandeau live',section:'Titre de section',nouveaute:'Nouveauté',article:'Article',bakmusic:"BAK'MUSIC",bouton:'Bouton',texte:'Texte',image:'Image',liens:'Réseaux & boutique'};
const TYPE_ICONS={live:'🔴',section:'📑',nouveaute:'🕯️',article:'📝',bakmusic:'🎵',bouton:'🔘',texte:'✍️',image:'🖼️',liens:'🔗'};

/* ---- Navigation (accueil / page BAK'MUSIC) ---- */
let currentView='home';
function hasMusic(){ return blocks.some(b=>b.type==='bakmusic'); }
function routeFromHash(){ const h=(location.hash||'').toLowerCase(); return (h==='#musique'||h==='#music'||h==='#bakmusic')?'musique':'home'; }
function goMusic(){ if(location.hash.toLowerCase()!=='#musique'){ location.hash='musique'; } else { applyRoute(); } }
function goHome(){ if(routeFromHash()==='musique'){ location.hash=''; } }
function applyRoute(){
  const v=routeFromHash();
  const changed=(v!==currentView);
  currentView=v;
  document.body.classList.toggle('view-music', v==='musique');
  const nav=$('#musicNav'); if(nav) nav.classList.toggle('active', v==='musique');
  render();
  if(changed) window.scrollTo(0,0);
}
window.addEventListener('hashchange',()=>{
  if((location.hash||'').toLowerCase()==='#admin'){ openLogin(); return; }
  applyRoute();
});

/* ============================================================
   BAK'MUSIC — moteur d'écoute
   Favoris, playlists et file de lecture. Données de l'auditeur
   enregistrées localement sur son appareil (rien n'est envoyé).
   ============================================================ */
const MUSIC_KEY='bakougie_music_user_v1';
let UM=loadUM();
function loadUM(){
  try{ const d=JSON.parse(localStorage.getItem(MUSIC_KEY));
    if(d&&Array.isArray(d.fav)&&Array.isArray(d.pls)) return {fav:d.fav,pls:d.pls,recent:Array.isArray(d.recent)?d.recent:[]};
  }catch(e){}
  return {fav:[],pls:[],recent:[]};
}
function saveUM(){ try{ localStorage.setItem(MUSIC_KEY,JSON.stringify(UM)); }catch(e){} }

/* ---- Catalogue ---- */
function allTracks(){ const o=[]; blocks.forEach(b=>{ if(b.type==='bakmusic') (b.data.tracks||[]).forEach(t=>{ if(t&&t.titre) o.push(t); }); }); return o; }
function tkey(t){ return (t&&t.url)?t.url:('t:'+((t&&t.titre)||'')); }
function trackByKey(k){ const a=allTracks(); for(let i=0;i<a.length;i++) if(tkey(a[i])===k) return a[i]; return null; }
function keysToTracks(keys){ return (keys||[]).map(trackByKey).filter(Boolean); }
function musicTitle(){ const b=blocks.find(x=>x.type==='bakmusic'); return (b&&b.data.titre)||"BAK'MUSIC"; }
function musicSub(){ const b=blocks.find(x=>x.type==='bakmusic'); return (b&&b.data.sous_titre)||''; }

/* ---- Favoris ---- */
function isFav(k){ return UM.fav.indexOf(k)>=0; }
function toggleFav(k){
  const i=UM.fav.indexOf(k);
  if(i>=0){ UM.fav.splice(i,1); toast('Retiré des favoris'); }
  else { UM.fav.unshift(k); toast('Ajouté aux favoris ♥'); }
  saveUM(); renderPage(); renderPlayer();
}
function favTracks(){ return keysToTracks(UM.fav); }

/* ---- Playlists ---- */
function plById(id){ return UM.pls.find(p=>p.id===id)||null; }
function createPlaylist(cb){
  openPrompt('Nouvelle playlist','Nom de la playlist','', v=>{
    const nom=v.trim(); if(!nom) return;
    const p={id:'p_'+Math.random().toString(36).slice(2,8),nom,keys:[]};
    UM.pls.unshift(p); saveUM(); toast('Playlist créée');
    if(cb) cb(p); else { musicTab='playlists'; renderPage(); }
  });
}
function renamePlaylist(id){
  const p=plById(id); if(!p) return;
  openPrompt('Renommer','Nom de la playlist',p.nom, v=>{ const n=v.trim(); if(!n) return; p.nom=n; saveUM(); renderPage(); toast('Playlist renommée'); });
}
function deletePlaylist(id){
  const p=plById(id); if(!p) return;
  if(!confirm('Supprimer la playlist « '+p.nom+' » ?')) return;
  UM.pls=UM.pls.filter(x=>x.id!==id); saveUM();
  if(openPl===id) openPl=null;
  renderPage(); toast('Playlist supprimée');
}
function addToPlaylist(id,k){
  const p=plById(id); if(!p) return;
  if(p.keys.indexOf(k)>=0){ toast('Déjà dans « '+p.nom+' »'); return; }
  p.keys.push(k); saveUM(); renderPage(); toast('Ajouté à « '+p.nom+' »');
}
function removeFromPlaylist(id,k){
  const p=plById(id); if(!p) return;
  p.keys=p.keys.filter(x=>x!==k); saveUM(); renderPage(); toast('Retiré de la playlist');
}
function movePlTrack(id,i,dir){
  const p=plById(id); if(!p) return; const j=i+dir;
  if(j<0||j>=p.keys.length) return;
  const t=p.keys[i]; p.keys[i]=p.keys[j]; p.keys[j]=t; saveUM(); renderPage();
}

/* ---- Récemment écoutés ---- */
function pushRecent(k){
  UM.recent=[k].concat((UM.recent||[]).filter(x=>x!==k)).slice(0,20);
  saveUM();
}

/* ---- Lecture ---- */
let audio=null, queue=[], qi=-1, shuffle=false, repeat='off', qName='';
function mmss(s){ if(!isFinite(s)||s<0) s=0; const m=Math.floor(s/60),r=Math.floor(s%60); return m+':'+String(r).padStart(2,'0'); }
function currentTrack(){ return (qi>=0&&queue[qi])?queue[qi]:null; }
function isPlaying(){ return !!(audio&&!audio.paused); }

function playList(list,idx,name){
  const clean=(list||[]).filter(t=>t&&t.url);
  if(!clean.length){ toast('Aucun titre lisible'); return; }
  const target=list[idx];
  let start=clean.indexOf(target); if(start<0) start=0;
  queue=clean; qi=start; qName=name||''; startCurrent();
}
function playAll(list,name,rnd){
  const clean=(list||[]).filter(t=>t&&t.url);
  if(!clean.length){ toast('Aucun titre lisible'); return; }
  queue=clean; qName=name||''; shuffle=!!rnd;
  qi=rnd?Math.floor(Math.random()*clean.length):0;
  startCurrent();
}
function startCurrent(){
  const t=currentTrack(); if(!t){ stopAll(); return; }
  if(audio){ audio.pause(); audio.removeAttribute('src'); audio.load(); }
  audio=new Audio(t.url);
  audio.preload='auto';
  audio.addEventListener('timeupdate',onTime);
  audio.addEventListener('loadedmetadata',()=>{ renderPlayer(); });
  audio.addEventListener('ended',onEnded);
  audio.addEventListener('error',()=>{ toast('Lecture impossible : '+(t.titre||'')); });
  audio.addEventListener('play',()=>{ document.body.classList.add('playing'); renderPlayer(); markRows(); });
  audio.addEventListener('pause',()=>{ renderPlayer(); markRows(); });
  document.body.classList.add('playing');
  pushRecent(tkey(t));
  audio.play().catch(()=>{ toast('Touchez à nouveau pour lancer la lecture'); });
  renderPlayer(); markRows();
  setMediaSession(t);
}
function onTime(){
  if(!audio) return;
  const f=document.getElementById('mpFill');
  if(f&&audio.duration) f.style.width=(audio.currentTime/audio.duration*100)+'%';
  const el=document.getElementById('mpTime');
  if(el) el.textContent=mmss(audio.currentTime)+' / '+(audio.duration?mmss(audio.duration):'—');
}
function onEnded(){
  if(repeat==='one'){ audio.currentTime=0; audio.play(); return; }
  nextTrack(true);
}
function nextTrack(auto){
  if(!queue.length) return;
  if(shuffle && queue.length>1){
    let n=qi; while(n===qi) n=Math.floor(Math.random()*queue.length);
    qi=n;
  } else {
    qi++;
    if(qi>=queue.length){
      if(repeat==='all'||!auto){ qi=0; }
      else { qi=queue.length-1; if(audio){audio.pause(); audio.currentTime=0;} renderPlayer(); markRows(); return; }
    }
  }
  startCurrent();
}
function prevTrack(){
  if(!queue.length) return;
  if(audio&&audio.currentTime>3){ audio.currentTime=0; return; }
  qi--; if(qi<0) qi=queue.length-1;
  startCurrent();
}
function togglePlayPause(){
  if(!audio){ if(queue.length&&qi>=0) startCurrent(); return; }
  if(audio.paused) audio.play(); else audio.pause();
}
function toggleShuffle(){ shuffle=!shuffle; toast(shuffle?'Lecture aléatoire activée':'Lecture aléatoire désactivée'); renderPlayer(); }
function cycleRepeat(){
  repeat = repeat==='off'?'all':(repeat==='all'?'one':'off');
  toast(repeat==='all'?'Répéter la liste':(repeat==='one'?'Répéter ce titre':'Répétition désactivée'));
  renderPlayer();
}
function stopAll(){
  if(audio){ audio.pause(); audio.removeAttribute('src'); audio.load(); audio=null; }
  queue=[]; qi=-1; qName='';
  document.body.classList.remove('playing');
  renderPlayer(); markRows();
}
function seekFromEvent(e){
  if(!audio||!audio.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  const x=(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX)-r.left;
  audio.currentTime=Math.max(0,Math.min(1,x/r.width))*audio.duration;
  onTime();
}
function setMediaSession(t){
  try{
    if(!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata=new MediaMetadata({title:t.titre||'',artist:'Bakougie',album:musicTitle(),
      artwork:[{src:'icon-512.png',sizes:'512x512',type:'image/png'}]});
    navigator.mediaSession.setActionHandler('play',()=>togglePlayPause());
    navigator.mediaSession.setActionHandler('pause',()=>togglePlayPause());
    navigator.mediaSession.setActionHandler('nexttrack',()=>nextTrack(false));
    navigator.mediaSession.setActionHandler('previoustrack',()=>prevTrack());
  }catch(e){}
}

/* ---- Marquage des lignes en cours ---- */
function markRows(){
  const cur=currentTrack(); const ck=cur?tkey(cur):null; const pl=isPlaying();
  document.querySelectorAll('#page .track').forEach(row=>{
    const on=(row.dataset.k===ck);
    row.classList.toggle('current',on);
    row.classList.toggle('playing',on&&pl);
    const ic=row.querySelector('.play-ic');
    if(ic) ic.textContent = (on&&pl)?'❚❚':'▶';
  });
}

/* ---- Mini-lecteur ---- */
function renderPlayer(){
  const box=document.getElementById('miniplayer'); if(!box) return;
  const t=currentTrack();
  if(!t){ box.innerHTML=''; document.body.classList.remove('playing'); return; }
  const pl=isPlaying();
  box.innerHTML=`
    <div class="mp-bar" onclick="seekFromEvent(event)"><i id="mpFill"></i></div>
    <div class="mp-body">
      <div class="mp-info" onclick="goMusic()">
        <b>${esc(t.titre||'')}</b>
        <span>${qName?esc(qName)+' · ':''}${qi+1}/${queue.length} · <span id="mpTime">0:00 / —</span></span>
      </div>
      <div class="mp-ctrl">
        <button class="mp-b ${shuffle?'on':''}" onclick="toggleShuffle()" title="Aléatoire" aria-label="Lecture aléatoire">⇄</button>
        <button class="mp-b" onclick="prevTrack()" title="Précédent" aria-label="Précédent">⏮</button>
        <button class="mp-play" onclick="togglePlayPause()" aria-label="${pl?'Pause':'Lecture'}">${pl?'❚❚':'▶'}</button>
        <button class="mp-b" onclick="nextTrack(false)" title="Suivant" aria-label="Suivant">⏭</button>
        <button class="mp-b ${repeat!=='off'?'on':''}" onclick="cycleRepeat()" title="Répéter" aria-label="Répéter">${repeat==='one'?'🔂':'🔁'}</button>
      </div>
      <button class="mp-close" onclick="stopAll()" aria-label="Fermer le lecteur">✕</button>
    </div>`;
  onTime();
}

function openPlaylist(id){ openPl=id; renderPage(); window.scrollTo({top:0,behavior:'smooth'}); }

function trackRow(t,i){

  html+=`<div class="pagehead"><button class="backbtn" onclick="goHome()">← Retour</button>

      <h2>${esc(musicTitle())}</h2>
      <div class="sub">${esc(musicSub())}${musicSub()?' · ':''}${lib.length} titre${lib.length>1?'s':''}</div>
    </div></div>`;

  html+=`<div class="mtabs">
    <button class="mtab ${musicTab==='titres'?'active':''}" onclick="setMusicTab('titres')">Titres</button>
    <button class="mtab ${musicTab==='favoris'?'active':''}" onclick="setMusicTab('favoris')">♥ Favoris <span class="cnt">${UM.fav.length}</span></button>

  </div>`;

  /* ----- Onglet TITRES ----- */
  if(musicTab==='titres'){
    const list=q?lib.filter(t=>fold(t.titre).includes(q)):lib;
    renderedList=list;
    html+=`<div class="m-search"><input type="text" placeholder="Rechercher un titre…" value="${esc(mFilter)}" oninput="mSearch(this.value)"></div>`;
    html+=listHeader(list.length,list,musicTitle());
    html+=`<ul class="tracks card-list">${list.map(trackRow).join('')||'<li class="m-empty">Aucun titre ne correspond.</li>'}</ul>`;
  }

  else if(musicTab==='favoris'){
    let list=favTracks();
    if(q) list=list.filter(t=>fold(t.titre).includes(q));
    renderedList=list;
    if(!UM.fav.length){
      html+=`<div class="m-blank"><div class="em">♡</div><h3>Aucun favori</h3>
        <p>Touchez le cœur à côté d'un titre pour le retrouver ici.</p>
        <button class="btn btn-primary" onclick="setMusicTab('titres')">Parcourir les titres</button></div>`;
    } else {
      html+=`<div class="m-search"><input type="text" placeholder="Rechercher dans mes favoris…" value="${esc(mFilter)}" oninput="mSearch(this.value)"></div>`;
      html+=listHeader(list.length,list,'Mes favoris');
      html+=`<ul class="tracks card-list">${list.map(trackRow).join('')||'<li class="m-empty">Aucun favori ne correspond.</li>'}</ul>`;
    }
  }

  /* ----- Onglet PLAYLISTS ----- */
  else {
    if(openPl){
      const p=plById(openPl);
      if(!p){ openPl=null; return renderMusicApp(); }
      let list=keysToTracks(p.keys);
      renderedList=list;
      html+=`<div class="pl-head">
        <button class="backbtn sm" onclick="backToPlaylists()">← Playlists</button>
        <h3>${esc(p.nom)}</h3>
        <div class="pl-tools">
          <button onclick="renamePlaylist('${p.id}')" aria-label="Renommer">✎</button>
          <button class="del" onclick="deletePlaylist('${p.id}')" aria-label="Supprimer">🗑</button>
        </div></div>`;
      if(!list.length){
        html+=`<div class="m-blank"><div class="em">♪</div><h3>Playlist vide</h3>
          <p>Ajoutez des titres avec le menu <b>⋯</b> à côté d'une chanson.</p>
          <button class="btn btn-primary" onclick="setMusicTab('titres')">Parcourir les titres</button></div>`;
      } else {
        html+=listHeader(list.length,list,p.nom);
        html+=`<ul class="tracks card-list">${list.map((t,i)=>{
          const k=tkey(t); const cur=currentTrack(); const on=cur&&tkey(cur)===k; const pl=on&&isPlaying();
          return `<li><div class="track ${on?'current':''} ${pl?'playing':''}" data-k="${esc(k)}">
            <button class="play-btn js-play" data-i="${i}"><span class="play-ic">${pl?'❚❚':'▶'}</span></button>
            <div class="track-main js-play" data-i="${i}"><div class="track-title">${esc(t.titre)}</div>
              ${on?'<div class="track-now">en cours de lecture</div>':''}</div>
            <span class="pl-ord">
              <button onclick="movePlTrack('${p.id}',${i},-1)" aria-label="Monter">↑</button>
              <button onclick="movePlTrack('${p.id}',${i},1)" aria-label="Descendre">↓</button>
            </span>
            <button class="more-btn js-more" data-k="${esc(k)}" aria-label="Options">⋯</button>
          </div></li>`;
        }).join('')}</ul>`;
      }
    } else {
      html+=`<button class="m-newpl" onclick="createPlaylist()">＋ Créer une playlist</button>`;
      if(!UM.pls.length){
        html+=`<div class="m-blank"><div class="em">≡</div><h3>Aucune playlist</h3>
          <p>Créez vos ambiances : « Pour l'atelier », « Détente du soir »…</p></div>`;
      } else {
        html+=`<div class="pl-grid">${UM.pls.map(p=>{
          const n=keysToTracks(p.keys).length;
          return `<div class="pl-card" onclick="openPlaylist('${p.id}')">
            <span class="pl-ico">♪</span>
            <span class="pl-main"><b>${esc(p.nom)}</b><span>${n} titre${n>1?'s':''}</span></span>
            <span class="pl-go">→</span></div>`;
        }).join('')}</div>`;
      }
    }
  }

  if(UM.recent && UM.recent.length && musicTab==='titres' && !q){
    const rec=keysToTracks(UM.recent).slice(0,5);
    if(rec.length) html+=`<div class="m-recent"><h4>Écoutés récemment</h4>
      <div class="rec-row">${rec.map(t=>`<button class="rec-chip js-rec" data-k="${esc(tkey(t))}">♪ ${esc(t.titre)}</button>`).join('')}</div></div>`;
  }
  return html;
}

function editFirstMusic(){ const b=blocks.find(x=>x.type==='bakmusic'); if(b) openMusicEditor(b.id); }

/* ---- Interactions déléguées ---- */
function onPageClick(e){
  const play=e.target.closest('.js-play');
  if(play){ const i=+play.dataset.i; const nm=(musicTab==='favoris')?'Mes favoris':(openPl?(plById(openPl)||{}).nom:musicTitle()); playList(renderedList,i,nm); return; }
  const fav=e.target.closest('.js-fav');
  if(fav){ toggleFav(fav.dataset.k); return; }
  const more=e.target.closest('.js-more');
  if(more){ openTrackSheet(more.dataset.k); return; }
  const rec=e.target.closest('.js-rec');
  if(rec){ const t=trackByKey(rec.dataset.k); if(t) playList([t],0,'Écoutés récemment'); return; }
}

/* ---- Menu d'un titre ---- */
function openTrackSheet(k){
  const t=trackByKey(k); if(!t) return;
  sheetCtx={k, pl:openPl};
  const pls=UM.pls.map(p=>`<button class="sheet-item" onclick="sheetAdd('${p.id}')"><span class="si">♪</span> ${esc(p.nom)} <span class="sn">${keysToTracks(p.keys).length}</span></button>`).join('');
  openModal(`<div class="modal-head"><h3>${esc(t.titre)}</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <button class="sheet-item strong" onclick="sheetFav()"><span class="si">${isFav(k)?'♥':'♡'}</span> ${isFav(k)?'Retirer des favoris':'Ajouter aux favoris'}</button>
      ${sheetCtx.pl?`<button class="sheet-item strong" onclick="sheetRemove()"><span class="si">✕</span> Retirer de cette playlist</button>`:''}
      ${t.url?`<a class="sheet-item strong" href="${esc(t.url)}" download target="_blank" rel="noopener" onclick="closeModal()"><span class="si">⤓</span> Télécharger</a>`:''}
      <div class="sheet-label">Ajouter à une playlist</div>
      ${pls||'<p class="muted">Aucune playlist pour l\'instant.</p>'}
      <button class="sheet-item new" onclick="sheetNewPl()"><span class="si">＋</span> Nouvelle playlist…</button>
    </div>`);
}
function sheetFav(){ if(!sheetCtx) return; toggleFav(sheetCtx.k); closeModal(); }
function sheetAdd(id){ if(!sheetCtx) return; addToPlaylist(id,sheetCtx.k); closeModal(); }
function sheetRemove(){ if(!sheetCtx||!sheetCtx.pl) return; removeFromPlaylist(sheetCtx.pl,sheetCtx.k); closeModal(); }
function sheetNewPl(){ const k=sheetCtx?sheetCtx.k:null; closeModal(); createPlaylist(p=>{ if(k) addToPlaylist(p.id,k); }); }

function openPrompt(titre,label,val,cb){
  openModal(`<div class="modal-head"><h3>${esc(titre)}</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><div class="field"><label>${esc(label)}</label>
      <input type="text" id="pr_v" value="${esc(val||'')}" onkeydown="if(event.key==='Enter')document.getElementById('pr_ok').click()"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="pr_ok">Valider</button></div>`);
  const inp=document.getElementById('pr_v');
  setTimeout(()=>{ if(inp){ inp.focus(); inp.select(); } },40);
  document.getElementById('pr_ok').onclick=()=>{ const v=inp?inp.value:''; closeModal(); cb(v); };
}

function blockInner(b, prevType){
  const d=b.data||{};
  switch(b.type){
    case 'live':{
      if(!d.actif && !isAdmin) return '';
      const cls='live-banner'+(d.actif?'':' inactive');
      const inner=`<span class="dot"></span><span>${esc(d.texte||'Live en cours')}</span>`;
      if(d.lien && d.actif) return `<a class="${cls}" href="${esc(d.lien)}" target="_blank" rel="noopener">${inner}</a>`;
      return `<div class="${cls}">${inner}${(!d.actif&&isAdmin)?' <span class="muted" style="color:#f2d9a8;margin-left:auto">(inactif)</span>':''}</div>`;
    }
    case 'section':
      return `<div class="section-head">${d.eyebrow?`<span class="eyebrow">${esc(d.eyebrow)}</span>`:''}<h2>${esc(d.titre||'')}</h2></div>`;
    case 'nouveaute':
      return `<article class="card">
        <div class="card-media">${d.image?`<img src="${esc(d.image)}" alt="${esc(d.titre)}" loading="lazy">`:'🕯️'}</div>
        <div class="card-body">${d.date?`<div class="card-date">${fmtDate(d.date)}</div>`:''}<h3>${esc(d.titre||'')}</h3><p>${esc(d.texte||'')}</p>
        ${d.lien?`<a class="more" href="${esc(d.lien)}" target="_blank" rel="noopener">Découvrir →</a>`:''}</div></article>`;
    case 'article':{
      const first = prevType!=='article';
      const inner=`${d.date?`<div class="card-date">${fmtDate(d.date)}</div>`:''}<h3>${esc(d.titre||'')}</h3><p>${esc(d.extrait||'')}</p>${d.lien?'<span class="more">Lire →</span>':''}`;
      const wrap = d.lien?`<a class="post" href="${esc(d.lien)}" target="_blank" rel="noopener">${inner}</a>`:`<div class="post">${inner}</div>`;
      return `<div class="${first?'journal-first':''}">${wrap}</div>`;
    }
    case 'bakmusic': return '';
    case 'bouton':
      return `<div class="cta-wrap"><a class="cta-btn" href="${esc(d.url||'#')}" target="_blank" rel="noopener">${esc(d.label||'Voir plus')}</a></div>`;
    case 'texte':
      return `<div class="textblock">${d.titre?`<h3>${esc(d.titre)}</h3>`:''}<p>${esc(d.corps||'')}</p></div>`;
    case 'image':
      return `<figure class="imgblock">${d.url?`<img src="${esc(d.url)}" alt="${esc(d.legende||'')}" loading="lazy">`:'<div class="ph">🖼️ Ajoutez une image</div>'}${d.legende?`<figcaption>${esc(d.legende)}</figcaption>`:''}</figure>`;
    case 'liens':{
      const L=CONFIG.liens||{}; let h='';
      if(L.boutique) h+=`<a class="link-btn" href="${esc(L.boutique)}" target="_blank" rel="noopener"><span class="ic shop">🛍️</span> Boutique en ligne <span class="arr">→</span></a>`;
      if(L.tiktok) h+=`<a class="link-btn" href="${esc(L.tiktok)}" target="_blank" rel="noopener"><span class="ic tt">♪</span> TikTok <span class="arr">→</span></a>`;
      if(L.instagram) h+=`<a class="link-btn" href="${esc(L.instagram)}" target="_blank" rel="noopener"><span class="ic ig">◎</span> Instagram <span class="arr">→</span></a>`;
      if(!h) h=isAdmin?'<p class="empty-note">Ajoutez vos liens dans « Réglages ».</p>':'';
      return `<div class="links">${h}</div>`;
    }
  }
  return '';
}
function renderPage(){
  const page=$('#page'); let html=''; let prevType=null;
  const musicView = (currentView==='musique');

  if(musicView){
    page.innerHTML=renderMusicApp();
    markRows(); return;
  }

  blocks.forEach((b,i)=>{
    if(b.type==='bakmusic'){
      if(isAdmin){
        html+=`<div class="block" data-id="${b.id}">
          <span class="blk-label">${TYPE_ICONS[b.type]} ${TYPE_LABELS[b.type]}</span>
          <span class="blk-tools">
            <button title="Monter" onclick="moveBlock('${b.id}',-1)">↑</button>
            <button title="Descendre" onclick="moveBlock('${b.id}',1)">↓</button>
            <button class="del" title="Supprimer" onclick="deleteBlock('${b.id}')">🗑</button>
          </span>
          <div class="admin-stub"><span class="em">🎵</span>
            <span class="st-main"><b>${esc(b.data.titre||"BAK'MUSIC")}</b>
            <span>${(b.data.tracks||[]).length} titres · sur sa propre page</span></span>
            <button onclick="goMusic()">Ouvrir</button></div></div>`;
      }
      prevType=b.type; return;
    }
    const inner=blockInner(b, prevType);
    if(inner==='' && !isAdmin){ prevType=b.type; return; }
    const tools = isAdmin ? `<span class="blk-label">${TYPE_ICONS[b.type]||''} ${TYPE_LABELS[b.type]||b.type}</span>
      <span class="blk-tools">
        <button title="Monter" onclick="moveBlock('${b.id}',-1)">↑</button>
        <button title="Descendre" onclick="moveBlock('${b.id}',1)">↓</button>
        <button title="Modifier" onclick="editBlock('${b.id}')">✎</button>
        <button class="del" title="Supprimer" onclick="deleteBlock('${b.id}')">🗑</button>
      </span>` : '';
    html+=`<div class="block" data-id="${b.id}">${tools}${inner||'<div class="empty-note">(bloc vide)</div>'}</div>`;
    prevType=b.type;
  });
  if(blocks.length===0) html=`<p class="empty-note">Aucun module. ${isAdmin?'Touchez « + Module » pour commencer.':''}</p>`;
  page.innerHTML=html;
  restorePlayingUI();
}
function restorePlayingUI(){ markRows(); }
function render(){ renderHeader(); renderPage(); }

/* ===== Admin : édition des blocs ===== */
function findBlock(id){ return blocks.find(b=>b.id===id); }
function moveBlock(id,dir){ const i=blocks.findIndex(b=>b.id===id); const j=i+dir; if(i<0||j<0||j>=blocks.length) return; const t=blocks[i]; blocks[i]=blocks[j]; blocks[j]=t; saveDraft(); renderPage(); }
function deleteBlock(id){ const b=findBlock(id); if(!b) return; if(!confirm(`Supprimer ce module « ${TYPE_LABELS[b.type]} » ?`)) return; blocks=blocks.filter(x=>x.id!==id); saveDraft(); renderPage(); toast('Module supprimé'); }

};
function defaultData(type){
  return ({live:{actif:true,texte:'🔴 Live TikTok en cours — venez !',lien:''},
    section:{eyebrow:'',titre:'Nouvelle section'},
    nouveaute:{date:today(),titre:'Nouveauté',texte:'',image:'',lien:''},
    article:{date:today(),titre:'Nouvel article',extrait:'',lien:''},
    bakmusic:{titre:"BAK'MUSIC",sous_titre:'Les chansons Bakougie',tracks:[]},
    bouton:{label:'En savoir plus',url:''},
    texte:{titre:'',corps:'Votre texte ici.'},
    image:{url:'',legende:''},
    liens:{}})[type];
}
function openAddModule(){
  const cards=Object.keys(TYPE_LABELS).map(t=>`<button class="type-card" onclick="addBlock('${t}')"><span class="em">${TYPE_ICONS[t]}</span> ${TYPE_LABELS[t]}</button>`).join('');
  openModal(`<div class="modal-head"><h3>Ajouter un module</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><div class="type-grid">${cards}</div></div>`);
}
function addBlock(type){
  const b={id:uid(),type,data:defaultData(type)};
  blocks.push(b); saveDraft(); closeModal(); renderPage(); toast('Module ajouté');
  if(SCHEMAS[type].length) editBlock(b.id);
}
function editBlock(id){
  const b=findBlock(id); if(!b) return;
  if(b.type==='liens'){ openSettings(); return; }
  if(b.type==='bakmusic'){ openMusicEditor(id); return; }
  const sc=SCHEMAS[b.type]||[];
  const fields=sc.map(f=>{
    const v=b.data[f.k]==null?'':b.data[f.k];
    if(f.type==='bool') return `<div class="field bool"><input type="checkbox" id="f_${f.k}" ${b.data[f.k]?'checked':''}><label for="f_${f.k}">${f.label}</label></div>`;
    if(f.type==='area') return `<div class="field"><label>${f.label}</label><textarea id="f_${f.k}">${esc(v)}</textarea></div>`;
    if(f.type==='date') return `<div class="field"><label>${f.label}</label><input type="date" id="f_${f.k}" value="${esc(v)}"></div>`;
    return `<div class="field"><label>${f.label}</label><input type="text" id="f_${f.k}" value="${esc(v)}"></div>`;
  }).join('');
  openModal(`<div class="modal-head"><h3>${TYPE_ICONS[b.type]} ${TYPE_LABELS[b.type]}</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${fields||'<p class="muted">Aucun réglage pour ce module.</p>'}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveBlock('${id}')">Enregistrer</button></div>`);
}
function saveBlock(id){
  const b=findBlock(id); if(!b) return;
  (SCHEMAS[b.type]||[]).forEach(f=>{
    const el=$('#f_'+f.k); if(!el) return;
    b.data[f.k] = f.type==='bool' ? el.checked : el.value;
  });
  saveDraft(); closeModal(); renderPage(); toast('Module mis à jour');
}

/* ===== Éditeur BAK'MUSIC ===== */
let musicEditFilter='';
function openMusicEditor(id){
  const b=findBlock(id); if(!b) return;
  if(!Array.isArray(b.data.tracks)) b.data.tracks=[];
  const all=b.data.tracks;
  const q=fold(musicEditFilter).trim();
  const rows=all.map((t,i)=>({t,i}))
    .filter(o=>!q||fold(o.t.titre).includes(q))
    .map(o=>`<div class="track-row">
      <span class="tr-num">${o.i+1}</span>
      <span class="tr-name">${esc(o.t.titre||'Sans titre')}</span>
      <button title="Monter" onclick="moveTrack('${id}',${o.i},-1)">↑</button>
      <button title="Descendre" onclick="moveTrack('${id}',${o.i},1)">↓</button>
      <button title="Modifier" onclick="openTrackForm('${id}',${o.i})">✎</button>
      <button class="del" title="Supprimer" onclick="deleteTrack('${id}',${o.i})">🗑</button>
    </div>`).join('');
  openModal(`<div class="modal-head"><h3>🎵 ${esc(b.data.titre||"BAK'MUSIC")}</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Titre de la section</label><input type="text" id="m_titre" value="${esc(b.data.titre||'')}" onchange="setMusicMeta('${id}')"></div>
      <div class="field"><label>Sous-titre (optionnel)</label><input type="text" id="m_sous" value="${esc(b.data.sous_titre||'')}" onchange="setMusicMeta('${id}')"></div>
      <div class="field"><label>Titres — ${all.length}</label>
        ${all.length>8?`<input type="text" placeholder="Filtrer…" value="${esc(musicEditFilter)}" oninput="musicEditSearch('${id}',this.value)" style="margin-bottom:9px">`:''}
        <div style="max-height:44vh;overflow:auto">${rows||'<p class="muted">Aucun titre pour l\'instant.</p>'}</div>
      </div>
      <button class="btn btn-gold" style="width:100%" onclick="openTrackForm('${id}',-1)">+ Ajouter un titre</button>
    </div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Terminé</button></div>`);
}
function musicEditSearch(id,v){ musicEditFilter=v; openMusicEditor(id); const i=document.querySelector('.modal input[placeholder="Filtrer…"]'); if(i){ i.focus(); i.setSelectionRange(i.value.length,i.value.length); } }
function setMusicMeta(id){
  const b=findBlock(id); if(!b) return;
  const t=$('#m_titre'), s=$('#m_sous');
  if(t) b.data.titre=t.value.trim(); if(s) b.data.sous_titre=s.value.trim();
  saveDraft(); renderPage();
}
function moveTrack(id,i,dir){
  const b=findBlock(id); const a=b.data.tracks; const j=i+dir;
  if(j<0||j>=a.length) return;
  const tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  saveDraft(); renderPage(); openMusicEditor(id);
}
function deleteTrack(id,i){
  const b=findBlock(id); const t=b.data.tracks[i];
  if(!confirm(`Supprimer « ${t.titre} » ?`)) return;
  b.data.tracks.splice(i,1); saveDraft(); renderPage(); openMusicEditor(id); toast('Titre supprimé');
}
function openTrackForm(id,i){
  const b=findBlock(id); const isNew=(i<0);
  const t=isNew?{titre:'',url:''}:b.data.tracks[i];
  openModal(`<div class="modal-head"><h3>${isNew?'Ajouter un titre':'Modifier le titre'}</h3><button class="icon-btn" onclick="openMusicEditor('${id}')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Nom de la chanson</label><input type="text" id="t_titre" value="${esc(t.titre||'')}" placeholder="ex. BAKOUGIE DANS L'AIR"></div>
      <div class="field"><label>Lien du fichier MP3</label><input type="text" id="t_url" value="${esc(t.url||'')}" placeholder="https://…/ma-chanson.mp3">
        <p class="muted" style="margin-top:6px">Collez le lien du fichier audio (celui de Shopify « Contenus → Fichiers », ou tout lien .mp3 public).</p></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="openMusicEditor('${id}')">Annuler</button><button class="btn btn-primary" onclick="saveTrack('${id}',${i})">Enregistrer</button></div>`);
  setTimeout(()=>{ const el=$('#t_titre'); if(el) el.focus(); },40);
}
function saveTrack(id,i){
  const b=findBlock(id);
  const titre=$('#t_titre').value.trim(), url=$('#t_url').value.trim();
  if(!titre){ toast('Donnez un nom à la chanson'); return; }
  if(i<0) b.data.tracks.push({titre,url}); else b.data.tracks[i]={titre,url};
  saveDraft(); renderPage(); openMusicEditor(id); toast(i<0?'Titre ajouté':'Titre modifié');
}

/* ===== Réglages (config) ===== */
function openSettings(){
  const L=CONFIG.liens||{};
  openModal(`<div class="modal-head"><h3>Réglages de la page</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Nom de la marque</label><input type="text" id="s_marque" value="${esc(CONFIG.marque||'')}"></div>
      <div class="field"><label>Accroche (sous le titre)</label><input type="text" id="s_tag" value="${esc(CONFIG.tagline||'')}"></div>
      <div class="field"><label>Introduction</label><textarea id="s_intro">${esc(CONFIG.intro||'')}</textarea></div>
      <div class="field"><label>Lien Boutique</label><input type="text" id="s_boutique" value="${esc(L.boutique||'')}"></div>
      <div class="field"><label>Lien TikTok</label><input type="text" id="s_tiktok" value="${esc(L.tiktok||'')}"></div>
      <div class="field"><label>Lien Instagram</label><input type="text" id="s_instagram" value="${esc(L.instagram||'')}"></div>
      <p class="muted">Notifications (OneSignal) : ${esc((CONFIG.oneSignalAppId||'').slice(0,8))}… — géré ailleurs, non modifiable ici.</p>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveSettings()">Enregistrer</button></div>`);
}
function saveSettings(){
  CONFIG.marque=$('#s_marque').value.trim()||'Bakougie';
  CONFIG.tagline=$('#s_tag').value.trim();
  CONFIG.intro=$('#s_intro').value.trim();
  CONFIG.liens={boutique:$('#s_boutique').value.trim(),tiktok:$('#s_tiktok').value.trim(),instagram:$('#s_instagram').value.trim()};
  saveDraft(); closeModal(); render(); toast('Réglages enregistrés');
}

/* ===== Publier (génère un nouveau contenu.js à déposer sur GitHub) ===== */
function publish(){
  const cfg=clone(CONFIG);
  const js = "/* BAKOUGIE — Contenu généré par l'espace admin le "+new Date().toLocaleString('fr-FR')+" */\n\n"
    + "const BAKOUGIE_CONFIG = "+JSON.stringify(cfg,null,2)+";\n\n"
    + "const PAGE_BLOCKS = "+JSON.stringify(blocks,null,2)+";\n";
  const blob=new Blob([js],{type:'text/javascript'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='contenu.js'; a.click(); URL.revokeObjectURL(url);
  openModal(`<div class="modal-head"><h3>Publier vos changements</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p>Le fichier <b>contenu.js</b> vient d'être téléchargé.</p>
      <ol class="steps" style="color:var(--ink-soft);padding-left:18px">
        <li>Ouvrez votre dépôt GitHub <b>bakougie-pixel/app</b>.</li>
        <li><b>Add file → Upload files</b>, glissez le nouveau <b>contenu.js</b> (il remplace l'ancien).</li>
        <li><b>Commit changes</b>. Le site est à jour pour tout le monde en ~1 minute.</li>
      </ol>
      <p class="muted">Tant que vous n'avez pas déposé ce fichier, vos changements restent visibles uniquement sur cet appareil.</p>
    </div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Compris</button></div>`);
}

/* ===== Connexion admin ===== */
function openLogin(){
  if(isAdmin){ // déjà connecté : proposer de quitter
    openModal(`<div class="modal-head"><h3>Espace admin</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
      <div class="modal-body"><p>Vous êtes connectée en administratrice.</p></div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Fermer</button><button class="btn btn-primary" onclick="logout()">Se déconnecter</button></div>`);
    return;
  }
  openModal(`<div class="modal-head"><h3>Connexion</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="login-lock">🔒</div>
      <div class="field"><label>Nom d'utilisateur</label><input type="text" id="lg_user" autocomplete="off" autocapitalize="characters"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="lg_pass" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="login-err" id="lg_err"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="doLogin()">Se connecter</button></div>`);
  setTimeout(()=>{ const u=$('#lg_user'); if(u) u.focus(); },40);
}
async function doLogin(){
  const u=$('#lg_user').value, p=$('#lg_pass').value; const err=$('#lg_err');
  try{
    const h=await sha256hex(ADMIN_SALT + (u||'').trim().toUpperCase() + ':' + (p||''));
    if(h===ADMIN_HASH){
      sessionStorage.setItem('bkg_admin','1'); isAdmin=true; document.body.classList.add('admin');
      const d=loadDraft(); if(d){ CONFIG=Object.assign(CONFIG,d.config||{}); blocks=d.blocks; }
      closeModal(); render(); toast('Bienvenue ✦');
    } else { err.textContent='Identifiants incorrects.'; await new Promise(r=>setTimeout(r,600)); }
  }catch(e){ err.textContent="Connexion sécurisée indisponible sur cette page (HTTPS requis)."; }
}
function logout(){ sessionStorage.removeItem('bkg_admin'); isAdmin=false; document.body.classList.remove('admin'); blocks=clone(PUBLISHED); CONFIG=Object.assign({marque:'Bakougie',tagline:'',intro:'',liens:{}},clone(CFG_DEFAULT)); closeModal(); render(); toast('Déconnectée'); }

/* ===== Modales ===== */
function openModal(html){ const r=$('#modal-root'); r.innerHTML=`<div class="overlay" id="ov"><div class="modal" role="dialog" aria-modal="true">${html}</div></div>`; $('#ov').addEventListener('mousedown',e=>{ if(e.target.id==='ov') closeModal(); }); document.addEventListener('keydown',escC); }
function closeModal(){ $('#modal-root').innerHTML=''; document.removeEventListener('keydown',escC); }
function escC(e){ if(e.key==='Escape') closeModal(); }

/* accès admin via #admin */
if((location.hash||'').toLowerCase()==='#admin') setTimeout(openLogin,300);

document.getElementById('page').addEventListener('click',onPageClick);
applyRoute();
renderPlayer();

/* ============================================================
   NOTIFICATIONS (OneSignal) — configuration qui fonctionne, inchangée
   ============================================================ */
const hasAppId = !!(CONFIG.oneSignalAppId && CONFIG.oneSignalAppId.trim());
let osReady=false, diagError=null;

if(isIOS() && !isStandalone()) $('#iosHint').innerHTML=' Sur iPhone : bouton <b>Partager</b> → <b>Sur l\'écran d\'accueil</b>.';

function renderNotifCard(state){
  const card=$('#notifCard'); const bell=$('#bellBtn'); const bl=$('#bellLabel');
  if(state==='setup'){ card.innerHTML=`<h2>🔔 Notifications</h2><p>Prévenez vos client·e·s des nouveautés, promos et lives.</p><div class="admin-note"><b>À configurer :</b> collez votre App ID OneSignal dans <b>contenu.js</b>.</div>`; bell.style.display='none'; return; }
  if(state==='unsupported'){ card.innerHTML=`<h2>🔔 Notifications</h2><p>Votre navigateur ne les prend pas en charge. Essayez Chrome (Android) ou installez la page sur l'écran d'accueil (iPhone).</p>`; bell.style.display='none'; return; }
  if(state==='ios-install'){ card.innerHTML=`<h2>🔔 Recevoir les notifications</h2><p>Sur iPhone, ajoutez d'abord la page à votre écran d'accueil, puis rouvrez-la pour activer.</p><ol class="steps"><li><span class="n">1</span> Bouton <b>Partager</b> en bas de Safari.</li><li><span class="n">2</span> <b>Sur l'écran d'accueil</b> → <b>Ajouter</b>.</li><li><span class="n">3</span> Ouvrez l'app <b>Bakougie</b> et touchez <b>Activer</b>.</li></ol>`; bell.style.display='none'; return; }
  if(state==='on'){ card.innerHTML=''; card.style.display='none'; bell.style.display=''; bell.classList.add('on'); bl.textContent='Activées ✓'; return; }
  card.style.display='';
  card.innerHTML=`<h2>🔔 Activer les notifications</h2><p>Soyez prévenu·e des nouveautés, promos et lives TikTok — sur votre téléphone.</p><button class="cta" onclick="enableNotifications()">Activer les notifications</button>`; bell.classList.remove('on'); bl.textContent='Notifications';
}
if(!hasAppId){ renderNotifCard('setup'); }
else if(!('Notification' in window)||!('serviceWorker' in navigator)){ (isIOS()&&!isStandalone())?renderNotifCard('ios-install'):renderNotifCard('unsupported'); }
else if(isIOS()&&!isStandalone()){ renderNotifCard('ios-install'); }
else { renderNotifCard('enable'); initOneSignal(); }

function initOneSignal(){
  if(!hasAppId) return;
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  window.OneSignalDeferred.push(async function(OneSignal){
    try{
      const dir = new URL('.', location.href).pathname;
      await OneSignal.init({ appId: CONFIG.oneSignalAppId.trim(), serviceWorkerPath: dir.replace(/^\//,'')+'OneSignalSDKWorker.js', serviceWorkerParam:{scope:dir}, allowLocalhostAsSecureOrigin:true });
      osReady=true; syncState(OneSignal);
      OneSignal.Notifications.addEventListener('permissionChange',()=>syncState(OneSignal));
      OneSignal.User.PushSubscription.addEventListener('change',()=>syncState(OneSignal));
    }catch(e){ diagError=(e&&e.message)||String(e); }
  });
}
function syncState(OneSignal){ try{ const on=OneSignal.Notifications.permission===true && OneSignal.User.PushSubscription.optedIn!==false; renderNotifCard(on?'on':'enable'); }catch(e){} }
function openNotifStatus(){
  openModal(`<div class="modal-head"><h3>🔔 Notifications</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><p>Vos notifications sont <b>activées</b>. Vous serez prévenu·e des nouveautés, promos et lives.</p></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Fermer</button><button class="btn btn-primary" onclick="disableNotifications();closeModal()">Se désabonner</button></div>`);
}
function enableNotifications(){
  if($('#bellBtn').classList.contains('on')){ openNotifStatus(); return; }
  if(!hasAppId){ toast('Notifications à configurer'); return; }
  if(isIOS()&&!isStandalone()){ renderNotifCard('ios-install'); toast("Ajoutez d'abord la page à l'écran d'accueil"); return; }
  window.OneSignalDeferred=window.OneSignalDeferred||[];
  window.OneSignalDeferred.push(async function(OneSignal){ try{ await OneSignal.Notifications.requestPermission(); try{ await OneSignal.User.PushSubscription.optIn(); }catch(_){} syncState(OneSignal); if(OneSignal.Notifications.permission===true) toast('Notifications activées 🔔'); }catch(e){ toast("Impossible d'activer ici"); } });
}
function disableNotifications(){ window.OneSignalDeferred=window.OneSignalDeferred||[]; window.OneSignalDeferred.push(async function(OneSignal){ try{ await OneSignal.User.PushSubscription.optOut(); syncState(OneSignal); toast('Désabonné·e'); }catch(e){} }); }
</script>
</body>
</html>
